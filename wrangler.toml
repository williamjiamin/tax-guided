name = "tax-guided"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain
routes = [
  { pattern = "taxguided.com", custom_domain = true },
  { pattern = "www.taxguided.com", custom_domain = true },
]

# KV namespaces for data storage
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "e59bdc1adcad46518d10e8716ae9021d"

# Expansion plan bindings — enable after provisioning the actual resources.
# [[r2_buckets]]
# binding = "TAX_DATA"
# bucket_name = "taxguided-data"
#
# [[kv_namespaces]]
# binding = "TAX_INDEX"
# id = "REPLACE_WITH_TAX_INDEX_NAMESPACE_ID"

# Static assets
[assets]
directory = ".open-next/assets"
binding = "ASSETS"
