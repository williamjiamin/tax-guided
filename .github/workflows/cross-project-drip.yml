# Daily cross-project content drip — fetches the foreignllctax.com router
# feed, AI-generates commentary for the tax-guided audience, auto-merges to
# main → triggers deploy.
#
# Architecture: see CLAUDE.md "Cross-project router consumer" section.
#
# Required GitHub Actions secrets:
#   - CF_API_TOKEN  : Cloudflare API token with "Workers AI Read" perm
#   - CF_ACCOUNT_ID : Cloudflare account ID (b592217282aafffff49d2fd557b56fc9)
#
# Optional repo variable to disable without removing the workflow:
#   - vars.CROSS_PROJECT_DRIP_DISABLED = true
#
# Manual: Actions tab → "Cross-project content drip" → Run workflow

name: Cross-project content drip

on:
  schedule:
    # 05:23 UTC every day — runs ~1 hour after foreignllctax's 04:17 UTC cron
    # so the router feed is refreshed before we read it.
    - cron: "23 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (no commit, no AI write)"
        required: false
        default: "false"
      max_new:
        description: "Max new entries this run (default 5)"
        required: false
        default: "5"

permissions:
  contents: write

concurrency:
  group: cross-project-drip
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check kill switch
        if: ${{ vars.CROSS_PROJECT_DRIP_DISABLED == 'true' }}
        run: |
          echo "::warning::CROSS_PROJECT_DRIP_DISABLED repo variable is true — skipping run."
          exit 0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tsx
        run: npm install --no-save tsx

      - name: Run cross-project drip
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_NEW: ${{ github.event.inputs.max_new || '5' }}
        run: npx tsx scripts/cross-project-drip.ts

      - name: Commit + push (if changes)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit (no fresh items from foreignllctax router today)."
            exit 0
          fi
          git config user.name "tax-guided Cross-Project Drip Bot"
          git config user.email "noreply@taxguided.com"
          git add src/lib/editorial/auto-news.ts .cron/news-seen.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "Auto-content: cross-project drip ${DATE}

           Generated by .github/workflows/cross-project-drip.yml from the
           foreignllctax.com router feed at
           https://foreignllctax.com/tax-news-router-output.json

           AI summarization via Cloudflare Workers AI (Llama 3.3 70B FP8 Fast).
           See CLAUDE.md for full architecture."
          git push origin HEAD:main
